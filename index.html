<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midwest Music Productions LLC</title>
</head>
<body style="background:#111; color:white; font-family:sans-serif; padding:40px;">

<h1>Midwest Music Productions</h1>
<p>Lincoln, Nebraska</p>

<h2>Contact / Booking</h2>

<form name="contact" method="POST" data-netlify="true">
 

<input type="hidden" name="redirect" value="/thanks.html">

  <p>
    <label>Name:<br>
      <input type="text" name="name" required>
    </label>
  </p>

  <p>
    <label>Email:<br>
      <input type="email" name="email" required>
    </label>
  </p>

  <p>
    <label>Reason:<br>
      <select name="reason">
        <option value="booking">Artist booking</option>
        <option value="tickets">Tickets</option>
        <option value="venue">Venue</option>
        <option value="other">Other</option>
      </select>
    </label>
  </p>

  <p>
    <label>Message:<br>
      <textarea name="message" required></textarea>
    </label>
  </p>

  <button type="submit">Send</button>
</form>

<p style="margin-top:40px;">
  Or email:  
  <a href="mailto:info@midwestmusicproductions.com" style="color:red;">
    info@midwestmusicproductions.com
  </a>
</p>

</body>
</html>
